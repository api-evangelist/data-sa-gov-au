apis:
  - aid: data-sa-gov-au:catalog
    name: data.sa.gov.au South Australia CKAN Action API
    description: >-
      CKAN Action API for data.sa.gov.au South Australia, a consistent JSON-over-HTTP interface over a catalog of 1,916 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.sa.gov.au/data/api/3/action/.
    humanURL: https://data.sa.gov.au/data
    baseURL: https://data.sa.gov.au/data/api/3/action
